<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Playoffs 2026 — Pronos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --card: #10101c;
  --card2: #14141f;
  --border: #1c1c2e;
  --border2: #26263a;
  --accent: #f7c744;
  --red: #e84560;
  --green: #2ecc71;
  --blue: #4e9eff;
  --text: #eeeef8;
  --muted: #52526a;
  --muted2: #8888a0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* ─── SCREENS ─── */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* ─── LOGIN ─── */
#screen-login {
  align-items: center; justify-content: center; padding: 2rem 1rem;
  background: radial-gradient(ellipse 70% 35% at 50% 0%, rgba(247,199,68,.07) 0%, transparent 60%);
}
.login-box { width: 100%; max-width: 400px; text-align: center; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 4.2rem; letter-spacing: 4px; line-height: 1; }
.logo span { color: var(--accent); }
.logo-sub { font-size: .68rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted2); margin-bottom: 2.5rem; margin-top: .2rem; }
.sec-title { font-size: .62rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: .65rem; text-align: left; }
.row { display: flex; gap: 8px; margin-bottom: 1.4rem; }
input[type="text"] {
  flex: 1; background: var(--card2); border: 1px solid var(--border2); border-radius: 8px;
  padding: .65rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .9rem; outline: none;
  transition: border-color .15s;
}
input[type="text"]:focus { border-color: var(--accent); }
input[type="text"]::placeholder { color: var(--muted); }
.btn {
  background: var(--accent); color: #08080f; border: none; border-radius: 8px;
  padding: .65rem 1.2rem; font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
  letter-spacing: 2px; cursor: pointer; transition: background .15s, transform .1s; white-space: nowrap;
}
.btn:hover { background: #ffd966; transform: translateY(-1px); }
.btn:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; transform: none; }
.divider { display: flex; align-items: center; gap: .6rem; margin-bottom: 1.4rem; color: var(--muted); font-size: .68rem; letter-spacing: 2px; text-transform: uppercase; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border2); }
.users-list { display: flex; flex-direction: column; gap: 5px; max-height: 220px; overflow-y: auto; padding-right: 2px; }
.users-list::-webkit-scrollbar { width: 3px; }
.users-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.user-chip {
  background: var(--card2); border: 1px solid var(--border2); border-radius: 8px;
  padding: .6rem 1rem; display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; transition: border-color .15s, background .15s;
  font-family: 'DM Sans', sans-serif; color: var(--text); font-size: .88rem; text-align: left;
}
.user-chip:hover { border-color: var(--accent); background: rgba(247,199,68,.04); }
.chip-name { font-weight: 500; }
.chip-meta { font-size: .68rem; color: var(--muted2); }
.note { color: var(--muted2); font-size: .78rem; text-align: center; padding: .75rem; }

/* ─── APP HEADER ─── */
.app-header {
  padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: rgba(8,8,16,.96);
  backdrop-filter: blur(10px); z-index: 20;
}
.app-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 3px; }
.app-logo span { color: var(--accent); }
.user-pill { display: flex; align-items: center; gap: .45rem; }
.avatar { width: 26px; height: 26px; background: var(--accent); color: #08080f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: .85rem; }
.uname { font-size: .8rem; color: var(--muted2); }
.btn-sm { background: none; border: 1px solid var(--border2); color: var(--muted2); font-size: .62rem; letter-spacing: 1.5px; text-transform: uppercase; border-radius: 5px; padding: .28rem .6rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: border-color .15s, color .15s; }
.btn-sm:hover { border-color: var(--red); color: var(--red); }

/* ─── CONTENT ─── */
.app-content { flex: 1; max-width: 760px; margin: 0 auto; width: 100%; padding: 1.75rem 1.25rem 4rem; }

/* ─── TABS ─── */
.tabs { display: flex; gap: 4px; background: var(--card2); border: 1px solid var(--border); border-radius: 9px; padding: 3px; margin-bottom: 1.75rem; }
.tab { flex: 1; background: transparent; border: none; color: var(--muted2); font-family: 'DM Sans', sans-serif; font-size: .8rem; font-weight: 500; padding: .5rem; border-radius: 7px; cursor: pointer; transition: background .15s, color .15s; }
.tab.active { background: var(--border2); color: var(--text); }

/* ─── SECTION LABEL ─── */
.sec-label { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 3px; color: var(--accent); margin-bottom: .9rem; display: flex; align-items: center; gap: .6rem; }
.sec-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--border2), transparent); }

/* ─── SERIES BLOCK ─── */
.series-block { margin-bottom: 2.25rem; }
.series-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.series-name { font-size: .62rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted2); }
.badge { font-size: .58rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; }
.badge.live { background: rgba(232,69,96,.15); color: var(--red); }
.badge.done { background: rgba(46,204,113,.1); color: var(--green); }
.badge.soon { background: rgba(247,199,68,.1); color: var(--accent); }
.live-dot { display: inline-block; width: 6px; height: 6px; background: var(--red); border-radius: 50%; animation: blink 1.2s infinite; margin-right: 4px; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.15} }

.series-scoreline { display: grid; grid-template-columns: 1fr auto 1fr; gap: .6rem; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1.1rem; margin-bottom: .75rem; }
.t-block { display: flex; flex-direction: column; gap: 2px; }
.t-block.right { text-align: right; }
.t-abbr { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: 1px; line-height: 1; }
.t-abbr.lead { color: var(--accent); }
.t-city { font-size: .68rem; color: var(--muted2); }
.s-center { text-align: center; }
.s-score { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 2px; }
.s-lbl { font-size: .58rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

/* ─── MATCH CARD ─── */
.match-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: .6rem; overflow: hidden; transition: border-color .2s;
  position: relative;
}
.match-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.match-card.past::before { background: var(--border2); }
.match-card.next::before { background: var(--accent); }
.match-card.upcoming::before { background: var(--border2); }

.match-top { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem .6rem; }
.match-gnum { font-family: 'Bebas Neue', sans-serif; font-size: .8rem; letter-spacing: 2px; color: var(--muted2); }
.match-result { font-size: .75rem; font-weight: 500; }
.match-result .mw { color: var(--accent); }
.match-result .ms { color: var(--muted2); margin-left: .3rem; font-size: .7rem; }
.match-result.pending { color: var(--muted); font-style: italic; font-size: .72rem; }

/* prono zone inside card */
.match-prono { border-top: 1px solid var(--border); padding: .8rem 1rem; }
.mp-label { font-size: .6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: .55rem; }
.mp-picks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: .75rem; }
.pick-btn {
  background: transparent; border: 1px solid var(--border2); border-radius: 7px;
  padding: .5rem .75rem; color: var(--muted2); font-family: 'DM Sans', sans-serif;
  font-size: .77rem; font-weight: 500; cursor: pointer; transition: all .15s; text-align: center;
}
.pick-btn:hover { border-color: var(--accent); color: var(--accent); }
.pick-btn.sel { background: rgba(247,199,68,.1); border-color: var(--accent); color: var(--accent); font-weight: 600; }
.range-row { margin-bottom: .75rem; }
.range-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .4rem; }
.range-val { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--accent); letter-spacing: 1px; }
input[type="range"] {
  -webkit-appearance: none; width: 100%; height: 3px;
  background: var(--border2); border-radius: 3px; outline: none; margin-bottom: 3px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  background: var(--accent); border-radius: 50%; cursor: pointer;
}
.range-ends { display: flex; justify-content: space-between; font-size: .58rem; color: var(--muted); }
.submit-row { display: flex; align-items: center; justify-content: flex-end; gap: .65rem; }
.flash { font-size: .68rem; color: var(--green); letter-spacing: 1px; opacity: 0; transition: opacity .3s; }
.flash.show { opacity: 1; }

/* prono locked display */
.prono-view { border-top: 1px solid var(--border); padding: .7rem 1rem; display: flex; align-items: center; justify-content: space-between; }
.pv-pick { font-size: .8rem; font-weight: 600; }
.pv-pick.correct { color: var(--green); }
.pv-pick.wrong { color: var(--red); }
.pv-pick.pending { color: var(--accent); }
.pv-detail { font-size: .68rem; color: var(--muted2); }
.pv-icon { font-size: .9rem; }

/* others pronos table */
.others-block { margin-top: .5rem; border-top: 1px solid var(--border); }
.others-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: .5rem 1rem; border-bottom: 1px solid var(--border); font-size: .78rem;
}
.others-row:last-child { border-bottom: none; }
.or-name { color: var(--muted2); font-size: .72rem; }
.or-pick { font-weight: 500; }
.or-pick.correct { color: var(--green); }
.or-pick.wrong { color: var(--red); }
.or-pick.pending { color: var(--text); }
.or-diff { font-size: .68rem; color: var(--muted); }

/* ─── LEADERBOARD ─── */
.lb-info { background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: .9rem 1.1rem; margin-bottom: 1.5rem; font-size: .77rem; color: var(--muted2); line-height: 1.6; }
.lb-info strong { color: var(--text); }
.lb-table { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.lb-head { display: grid; grid-template-columns: 36px 1fr 50px 50px; padding: .55rem 1.1rem; font-size: .6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
.lb-row { display: grid; grid-template-columns: 36px 1fr 50px 50px; padding: .75rem 1.1rem; border-bottom: 1px solid var(--border); align-items: center; font-size: .83rem; }
.lb-row:last-child { border-bottom: none; }
.lb-row.me { background: rgba(247,199,68,.04); }
.lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: .95rem; color: var(--muted); }
.lb-rank.top { color: var(--accent); }
.lb-name { font-weight: 500; }
.lb-c { text-align: right; color: var(--muted2); font-size: .75rem; }
.lb-c.pts { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; color: var(--text); }
.lb-empty { text-align: center; color: var(--muted); padding: 2rem; font-size: .83rem; }


/* ─── DETAIL DRAWER ─── */
.drawer-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px); z-index: 50; align-items: flex-end; justify-content: center;
}
.drawer-overlay.open { display: flex; }
.drawer {
  background: #0f0f1c; border: 1px solid var(--border2); border-radius: 16px 16px 0 0;
  width: 100%; max-width: 760px; max-height: 85vh; overflow-y: auto;
  padding: 0 0 2rem; transform: translateY(100%); transition: transform .3s ease;
}
.drawer-overlay.open .drawer { transform: translateY(0); }
.drawer::-webkit-scrollbar { width: 3px; }
.drawer::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.drawer-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 0; }
.drawer-header {
  padding: 1rem 1.25rem .75rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0;
  background: #0f0f1c; z-index: 2;
}
.drawer-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; }
.drawer-pts { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); letter-spacing: 1px; }
.drawer-pts span { font-size: .7rem; letter-spacing: 2px; color: var(--muted2); font-family: 'DM Sans', sans-serif; margin-left: 4px; }
.btn-close { background: none; border: 1px solid var(--border2); color: var(--muted2); border-radius: 6px; padding: .28rem .65rem; font-size: .7rem; cursor: pointer; font-family: 'DM Sans', sans-serif; letter-spacing: 1px; transition: border-color .15s, color .15s; }
.btn-close:hover { border-color: var(--red); color: var(--red); }

/* detail rows */
.detail-section { padding: .9rem 1.25rem .25rem; }
.detail-section-title { font-size: .6rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--accent); margin-bottom: .6rem; }
.detail-row {
  display: grid; grid-template-columns: 1fr 90px 70px 60px;
  gap: .5rem; align-items: center; padding: .65rem .75rem; border-radius: 8px;
  margin-bottom: 5px; background: var(--card); border: 1px solid var(--border);
  font-size: .8rem;
}
.detail-row.correct { border-color: rgba(46,204,113,.2); background: rgba(46,204,113,.04); }
.detail-row.wrong   { border-color: rgba(232,69,96,.15); background: rgba(232,69,96,.03); }
.detail-row.pending { border-color: var(--border); }
.dr-match { display: flex; flex-direction: column; gap: 2px; }
.dr-label { font-size: .62rem; color: var(--muted2); letter-spacing: .5px; }
.dr-pick { font-weight: 500; }
.dr-pick.ok  { color: var(--green); }
.dr-pick.ko  { color: var(--red); }
.dr-pick.nd  { color: var(--muted2); }
.dr-diff-col { text-align: center; }
.dr-diff-predicted { font-size: .78rem; color: var(--text); }
.dr-diff-actual { font-size: .65rem; color: var(--muted2); margin-top: 1px; }
.dr-gap { text-align: center; }
.gap-pill { display: inline-block; font-size: .68rem; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
.gap-pill.exact  { background: rgba(46,204,113,.15); color: var(--green); }
.gap-pill.close  { background: rgba(247,199,68,.12); color: var(--accent); }
.gap-pill.far    { background: rgba(255,255,255,.05); color: var(--muted2); }
.gap-pill.nd     { background: transparent; color: var(--muted); }
.dr-pts-col { text-align: right; }
.dr-pts-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 1px; }
.dr-pts-val.pos { color: var(--accent); }
.dr-pts-val.zero { color: var(--muted); }
.dr-pts-val.nd   { color: var(--muted); font-size: .75rem; font-family: 'DM Sans', sans-serif; }
.dr-total-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: .7rem .75rem; margin: .5rem 0 0; border-top: 1px solid var(--border2);
  font-size: .78rem; color: var(--muted2);
}
.dr-total-pts { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--accent); }
.dr-pending-note { font-size: .68rem; color: var(--muted); font-style: italic; margin-top: .3rem; }

/* lb-row clickable */
.lb-row { cursor: pointer; }
.lb-row:hover { background: rgba(247,199,68,.04); }
.lb-row.me:hover { background: rgba(247,199,68,.08); }
.lb-name-arrow::after { content: ' ›'; color: var(--muted); font-size: .8rem; }

/* ─── TOAST ─── */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--card2); border: 1px solid var(--border2); border-radius: 7px; padding: .6rem 1.2rem; font-size: .8rem; z-index: 100; transition: transform .3s; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
.spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

@media(max-width:480px) {
  .logo { font-size: 3.2rem; }
  .t-abbr { font-size: 1.4rem; }
  .lb-head, .lb-row { grid-template-columns: 30px 1fr 45px 45px; }
}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="logo">NBA <span>PRONOS</span></div>
    <div class="logo-sub">Playoffs 2026</div>

    <div class="sec-title">Nouveau joueur</div>
    <div class="row">
      <input type="text" id="inp-pseudo" placeholder="Ton pseudo…" maxlength="20" autocomplete="off">
      <button class="btn" onclick="loginNew()">GO</button>
    </div>

    <div class="divider">ou rejoindre</div>

    <div class="sec-title">Joueurs existants</div>
    <div class="users-list" id="users-list">
      <div class="note"><span class="spinner"></span> Chargement…</div>
    </div>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="screen-app" class="screen">
  <div class="app-header">
    <div class="app-logo">NBA <span>PRONOS</span><span id="dev-badge" style="display:none;font-size:.55rem;letter-spacing:2px;background:#e84560;color:#fff;border-radius:3px;padding:2px 7px;margin-left:8px;vertical-align:middle">DEV</span></div>
    <div class="user-pill">
      <div class="avatar" id="hdr-av">?</div>
      <span class="uname" id="hdr-name">—</span>
      <button class="btn-sm" onclick="logout()">Changer</button>
    </div>
  </div>

  <div class="app-content">
    <div class="tabs">
      <button class="tab active" onclick="setTab('pronos',this)">🏀 Mes Paris</button>
      <button class="tab" onclick="setTab('board',this)">🏆 Classement</button>
    </div>

    <div id="tab-pronos">
      <div id="pronos-container"><div style="text-align:center;padding:3rem"><span class="spinner"></span></div></div>
    </div>

    <div id="tab-board" style="display:none">
      <div class="lb-info">
        <strong>Points :</strong> +3 pts vainqueur correct · +2 pts si écart ±3 pts · +1 pt si écart ±7 pts
      </div>
      <div id="lb-container"><div class="lb-table"><div class="lb-empty"><span class="spinner"></span></div></div></div>
    </div>
  </div>
</div>

<!-- ══════════ DETAIL DRAWER ══════════ -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer(event)">
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <div>
        <div class="drawer-title" id="drawer-name">—</div>
        <div style="font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2)">Détail des pronos</div>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem">
        <div><span class="drawer-pts" id="drawer-pts">0</span><span>pts</span></div>
        <button class="btn-close" onclick="document.getElementById('drawer-overlay').classList.remove('open')">FERMER</button>
      </div>
    </div>
    <div id="drawer-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const IS_DEV  = new URLSearchParams(window.location.search).has('dev');
const BIN_ID  = IS_DEV ? '6a0ff92c6877513b27b29f3a' : '6a0f5f876877513b27aed9f3';
const BIN_KEY = '$2a$10$qHs/E9l5SuCFpgM5hOBjnuncSRnjo6psyEDp5mO3m53pNQaDGbB.q';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// ══════════════════════════════════════════
//  NBA DATA
//  Définition des séries — les matchs sont
//  entièrement reconstruits depuis l'API
// ══════════════════════════════════════════
const BDL_KEY = '0edbbff5-741c-44f6-8ffb-197a9f1dd9d6';
const BDL_BASE = 'https://api.balldontlie.io/v1';

// Map nom complet → abbr interne (toutes les équipes possibles pour les Finals)
const TEAM_ABBR = {

async function dbRead() {
  try {
    const r = await fetch(BIN_URL + '/latest', {
      headers: { 'X-Master-Key': BIN_KEY, 'X-Bin-Meta': 'false' }
    });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    if (data && data.users) db = data;
  } catch(e) { console.warn('dbRead', e); }
}

async function dbWrite() {
  try {
    const r = await fetch(BIN_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': BIN_KEY },
      body: JSON.stringify(db),
    });
    if (!r.ok) throw new Error(r.status);
  } catch(e) { toast('⚠️ Erreur de sauvegarde'); console.warn('dbWrite', e); }
}

//  NBA LIVE DATA  (balldontlie)

// ══════════════════════════════════════════
async function fetchNBAResults() {
  try {
    // L'endpoint /games filtre par postseason=true et saison 2025 (= saison 2025-26)
    // La clé gratuite autorise cet endpoint. On pagine si besoin (per_page=100 max).
    let allGames = [];
    let cursor = null;
    let page = 0;
    do {
      const params = new URLSearchParams({
        'seasons[]': '2025',
        postseason: 'true',
        per_page: '100',
      });
      if (cursor) params.set('cursor', cursor);
      const r = await fetch(`${BDL_BASE}/games?${params}`, {
        headers: { 'Authorization': BDL_KEY }
      });
      if (!r.ok) { console.warn('BDL fetch error', r.status); break; }
      const data = await r.json();
      allGames = allGames.concat(data.data || []);
      cursor = data.meta?.next_cursor ?? null;
      page++;
    } while (cursor && page < 5); // sécurité : max 5 pages

    if (allGames.length) {
      applyLiveData(allGames);
    } else {
      // Fallback si API vide : données codées en dur à jour au 22 mai 2026
      applyFallback();
    }
  } catch(e) {
    console.warn('BDL error, using fallback', e);
    applyFallback();
  }
}

// Fallback codé en dur (derniers résultats connus)
function applyFallback() {
  const east = SERIES.find(s => s.id === 'east-finals');
  east.matches = [
    { id: 'east-g1', num: 1, winner: 'NYK', score1: 119, score2: 107 },
  ];
  const west = SERIES.find(s => s.id === 'west-finals');
  west.matches = [
    { id: 'west-g1', num: 1, winner: 'SAS', score1: 115, score2: 122 },
    { id: 'west-g2', num: 2, winner: 'OKC', score1: 122, score2: 113 },
  ];
  recomputeSeries();
}

function applyLiveData(games) {
  // On garde uniquement les matchs terminés (status "Final")
  // et on les groupe par paire d'équipes pour reconstruire chaque série
  const finished = games.filter(g =>
    g.status === 'Final' &&
    (g.home_team_score > 0 || g.visitor_team_score > 0)
  );

  // Groupe par série (paire d'équipes) — trié par date pour avoir le bon numéro de match
  finished.sort((a, b) => new Date(a.date) - new Date(b.date));

  // Pour chaque série connue, collecte les matchs correspondants
  SERIES.forEach(s => {
    if (s.id === 'nba-finals') return; // on remplira après
    s.matches = [];
    const abbrs = [s.team1.abbr, s.team2.abbr];

    const seriesGames = finished.filter(g => {
      const ha = TEAM_ABBR[g.home_team?.full_name];
      const va = TEAM_ABBR[g.visitor_team?.full_name];
      return abbrs.includes(ha) && abbrs.includes(va);
    });

    seriesGames.forEach((g, idx) => {
      const ha = TEAM_ABBR[g.home_team?.full_name];
      const va = TEAM_ABBR[g.visitor_team?.full_name];
      const hs = g.home_team_score, vs = g.visitor_team_score;
      // Oriente score1/score2 selon l'ordre team1/team2 de la série
      const score1 = ha === s.team1.abbr ? hs : vs;
      const score2 = ha === s.team2.abbr ? hs : vs;
      const winner = score1 > score2 ? s.team1.abbr : s.team2.abbr;
      const num = idx + 1;
      s.matches.push({ id: `${s.id}-g${num}`, num, winner, score1, score2 });
    });
  });

  // Détecte si des équipes inconnues ont joué (NBA Finals en cours ou à venir)
  const knownAbbrs = ['NYK','CLE','OKC','SAS'];
  const finalsGames = finished.filter(g => {
    const ha = TEAM_ABBR[g.home_team?.full_name];
    const va = TEAM_ABBR[g.visitor_team?.full_name];
    return ha && va && !knownAbbrs.includes(ha) === false && !knownAbbrs.includes(va) === false
      && !(
        (ha === 'NYK' || ha === 'CLE') && (va === 'NYK' || va === 'CLE') ||
        (ha === 'OKC' || ha === 'SAS') && (va === 'OKC' || va === 'SAS')
      );
  });

  if (finalsGames.length) {
    const nbaF = SERIES.find(s => s.id === 'nba-finals');
    const firstGame = finalsGames[0];
    const ha = TEAM_ABBR[firstGame.home_team?.full_name];
    const va = TEAM_ABBR[firstGame.visitor_team?.full_name];
    // Détermine team1 (Est) et team2 (Ouest) — heuristique : conf détectée via données codées
    const eastTeam = ['NYK','CLE','BOS','MIA','MIL','IND','PHI','CHI','ATL','BKN','TOR','DET','CHA','WAS','ORL'].includes(ha) ? ha : va;
    const westTeam = eastTeam === ha ? va : ha;
    nbaF.team1 = { abbr: eastTeam, name: firstGame[eastTeam === ha ? 'home_team' : 'visitor_team'].full_name };
    nbaF.team2 = { abbr: westTeam, name: firstGame[westTeam === ha ? 'home_team' : 'visitor_team'].full_name };
    nbaF.matches = finalsGames.map((g, idx) => {
      const hs = g.home_team_score, vs = g.visitor_team_score;
      const h = TEAM_ABBR[g.home_team?.full_name];
      const score1 = h === nbaF.team1.abbr ? hs : vs;
      const score2 = h === nbaF.team2.abbr ? hs : vs;
      const winner = score1 > score2 ? nbaF.team1.abbr : nbaF.team2.abbr;
      return { id: `nba-finals-g${idx+1}`, num: idx+1, winner, score1, score2 };
    });
  }

  recomputeSeries();
}

function recomputeSeries() {
  SERIES.forEach(s => {
    if (s.id === 'nba-finals' && s.team1.abbr === '???') return;
    s.wins1 = s.matches.filter(m => m.winner === s.team1.abbr).length;
    s.wins2 = s.matches.filter(m => m.winner === s.team2.abbr).length;
    if (s.wins1 >= 4) { s.done = true; s.seriesWinner = s.team1.abbr; }
    else if (s.wins2 >= 4) { s.done = true; s.seriesWinner = s.team2.abbr; }
    else { s.done = false; s.seriesWinner = null; s.nextGame = s.matches.length + 1; }
  });
  updateFinalsTeams();
}

function updateFinalsTeams() {
  const finals = SERIES.find(s => s.id === 'nba-finals');
  // Ne met à jour que si les equipes sont encore inconnues (pas encore de matchs NBA Finals)
  if (!finals || finals.matches.length > 0) return;
  const east = SERIES.find(s => s.id === 'east-finals');
  const west = SERIES.find(s => s.id === 'west-finals');
  if (east?.seriesWinner) {
    const w = east.seriesWinner === east.team1.abbr ? east.team1 : east.team2;
    finals.team1 = { ...w };
  }
  if (west?.seriesWinner) {
    const w = west.seriesWinner === west.team1.abbr ? west.team1 : west.team2;
    finals.team2 = { ...w };
  }
  // Recalcule wins des Finals si matchs présents
  if (finals.matches.length) {
    finals.wins1 = finals.matches.filter(m => m.winner === finals.team1.abbr).length;
    finals.wins2 = finals.matches.filter(m => m.winner === finals.team2.abbr).length;
    if (finals.wins1 >= 4) { finals.done = true; finals.seriesWinner = finals.team1.abbr; }
    else if (finals.wins2 >= 4) { finals.done = true; finals.seriesWinner = finals.team2.abbr; }
    else { finals.nextGame = finals.matches.length + 1; }
  }
}

function loginNew() {
  const name = document.getElementById('inp-pseudo').value.trim();
  if (name.length < 2) { toast('Pseudo trop court'); return; }
  const dup = Object.values(db.users||{}).find(u => u.name.toLowerCase() === name.toLowerCase());
  if (dup) { toast('Pseudo déjà pris, sélectionne-le ci-dessous'); return; }
  const uid = 'u' + Date.now();
  if (!db.users) db.users = {};
  if (!db.pronos) db.pronos = {};
  db.users[uid] = { name, ts: Date.now() };
  db.pronos[uid] = {};
  dbWrite();
  enterApp(uid);

  enterApp(uid);

// Affiche mon prono sur un match passé (avec résultat)
function renderPastProno(s, m, myPronos) {
  const matchKey = `${s.id}-g${m.num}`;
  const p = myPronos[matchKey];
  if (!p) return '';
  const correct = p.winner === m.winner;
  const actualDiff = Math.abs(m.score1 - m.score2);
  const diffOk = Math.abs(p.diff - actualDiff) <= 3 ? 'exact' : Math.abs(p.diff - actualDiff) <= 7 ? 'proche' : '';
  return `<div class="prono-view">
    <div>
      <div class="pv-pick ${correct?'correct':'wrong'}">${correct?'✓':'✗'} ${p.winner === s.team1.abbr ? s.team1.name : s.team2.name}</div>
      <div class="pv-detail">Prédit ± ${p.diff} pts · Réel ${actualDiff} pts ${diffOk==='exact'?'🎯':diffOk==='proche'?'👍':''}</div>
    </div>
    <div class="pv-icon">${correct?'🎯':'💀'}</div>
  </div>`;
}

// Affiche les pronos des autres sur le prochain match (visible seulement si j'ai parié)
function renderOthersPronos(s, matchKey, myProno) {
  if (!myProno) return '';
  const others = Object.keys(db.users)
    .filter(uid => uid !== currentUser)
    .map(uid => ({ uid, name: db.users[uid].name, p: (db.pronos[uid]||{})[matchKey] }))
    .filter(u => u.p);

  if (!others.length) return `<div style="padding:.6rem 1rem;font-size:.7rem;color:var(--muted)">Aucun autre joueur n'a encore parié.</div>`;

  const rows = others.map(u => `
    <div class="others-row">
      <span class="or-name">${esc(u.name)}</span>
      <span class="or-pick pending">${u.p.winner === s.team1.abbr ? s.team1.name : s.team2.name}</span>
      <span class="or-diff">± ${u.p.diff} pts</span>
    </div>`).join('');

  return `<div class="others-block">${rows}</div>`;
}

// Calcule les points d'un utilisateur ET retourne le détail par pari
function calcScoreDetail(uid) {
  const up = db.pronos[uid] || {};
  let totalPts = 0;
  const detail = []; // { series, matchNum, prono, match, pts, diffGap }

  SERIES.forEach(s => {
    s.matches.forEach(m => {
      const key = `${s.id}-g${m.num}`;
      const p = up[key];
      if (!p) return;
      const actual = Math.abs(m.score1 - m.score2);
      const d = Math.abs(p.diff - actual);
      let pts = 0;
      let diffPts = 0;
      if (p.winner === m.winner) {
        pts += 3;
        if (d <= 3) { diffPts = 2; }
        else if (d <= 7) { diffPts = 1; }
        pts += diffPts;
      }
      totalPts += pts;
      detail.push({ series: s, matchNum: m.num, match: m, prono: p, pts, diffPts, actual, d, resultKnown: true });
    });
    // Paris sur le prochain match (pas encore joué)
    const nextKey = `${s.id}-g${s.nextGame}`;
    const pNext = up[nextKey];
    if (pNext && !s.done) {
      detail.push({ series: s, matchNum: s.nextGame, match: null, prono: pNext, pts: null, diffPts: null, actual: null, d: null, resultKnown: false });
    }
  });

  return { totalPts, detail };
}

function calcScore(uid) {
  return calcScoreDetail(uid).totalPts;
}

function renderLeaderboard() {
  const users = Object.keys(db.users || {}).map(uid => ({
    uid,
    name: db.users[uid].name,
    pts: calcScore(uid),
    bets: Object.keys(db.pronos[uid] || {}).length,
  })).sort((a,b) => b.pts - a.pts || b.bets - a.bets);

  const el = document.getElementById('lb-container');
  if (!users.length) {
    el.innerHTML = '<div class="lb-table"><div class="lb-empty">Aucun joueur.</div></div>';
    return;
  }

  const rows = users.map((u,i) => `
    <div class="lb-row ${u.uid===currentUser?'me':''}" onclick="openDrawer('${u.uid}')">
      <div class="lb-rank ${i<3?'top':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
      <div class="lb-name lb-name-arrow">${esc(u.name)}${u.uid===currentUser?' <span style="color:var(--muted);font-size:.7rem">(moi)</span>':''}</div>
      <div class="lb-c">${u.bets}</div>
      <div class="lb-c pts">${u.pts}</div>
    </div>`).join('');

  el.innerHTML = `<div class="lb-table">
    <div class="lb-head"><div>#</div><div>Joueur</div><div>Paris</div><div>Pts</div></div>
    ${rows}
  </div>`;
}

// ══════════════════════════════════════════
//  DETAIL DRAWER
// ══════════════════════════════════════════
function openDrawer(uid) {
  const user = db.users[uid];
  if (!user) return;
  const { totalPts, detail } = calcScoreDetail(uid);

  document.getElementById('drawer-name').textContent = user.name + (uid === currentUser ? ' (moi)' : '');
  document.getElementById('drawer-pts').textContent = totalPts;

  // Groupe par série
  const bySeries = {};
  detail.forEach(d => {
    const sid = d.series.id;
    if (!bySeries[sid]) bySeries[sid] = [];
    bySeries[sid].push(d);
  });

  let html = '';

  if (!detail.length) {
    html = '<div style="padding:2rem;text-align:center;color:var(--muted);font-size:.82rem">Aucun pari enregistré.</div>';
  } else {
    Object.keys(bySeries).forEach(sid => {
      const items = bySeries[sid];
      const s = items[0].series;
      html += `<div class="detail-section">
        <div class="detail-section-title">${s.label}</div>`;

      items.sort((a,b) => a.matchNum - b.matchNum).forEach(item => {
        const { match, prono, pts, diffPts, actual, d, resultKnown } = item;
        const pickName = prono.winner === s.team1.abbr ? s.team1.name : s.team2.name;

        if (!resultKnown) {
          // Match à venir
          html += `<div class="detail-row pending">
            <div class="dr-match">
              <div class="dr-label">Match ${item.matchNum} · À jouer</div>
              <div class="dr-pick nd">📌 ${esc(pickName)}</div>
            </div>
            <div class="dr-diff-col">
              <div class="dr-diff-predicted">± ${prono.diff} pts</div>
              <div class="dr-diff-actual">Prédit</div>
            </div>
            <div class="dr-gap"><span class="gap-pill nd">—</span></div>
            <div class="dr-pts-col"><span class="dr-pts-val nd">?</span></div>
          </div>`;
          return;
        }

        const correct = prono.winner === match.winner;
        const rowClass = correct ? 'correct' : 'wrong';
        const pickClass = correct ? 'ok' : 'ko';
        const icon = correct ? '✓' : '✗';
        const actualDiff = actual;

        let gapLabel = ''; let gapClass = '';
        if (correct) {
          if (d <= 3)      { gapLabel = `±${d} 🎯`; gapClass = 'exact'; }
          else if (d <= 7) { gapLabel = `±${d} 👍`; gapClass = 'close'; }
          else             { gapLabel = `±${d}`;     gapClass = 'far'; }
        } else {
          gapLabel = `±${d}`; gapClass = 'far';
        }

        const ptsDisplay = pts > 0
          ? `<span class="dr-pts-val pos">+${pts}</span>`
          : `<span class="dr-pts-val zero">0</span>`;

        const breakdown = correct
          ? `<div style="font-size:.6rem;color:var(--muted);margin-top:2px">Victoire +3${diffPts>0?' · Écart +'+diffPts:''}</div>`
          : '';

        html += `<div class="detail-row ${rowClass}">
          <div class="dr-match">
            <div class="dr-label">Match ${item.matchNum} · Réel: ${Math.max(match.score1,match.score2)}–${Math.min(match.score1,match.score2)}</div>
            <div class="dr-pick ${pickClass}">${icon} ${esc(pickName)}</div>
            ${breakdown}
          </div>
          <div class="dr-diff-col">
            <div class="dr-diff-predicted">± ${prono.diff} pts</div>
            <div class="dr-diff-actual">Réel: ${actualDiff} pts</div>
          </div>
          <div class="dr-gap"><span class="gap-pill ${gapClass}">${gapLabel}</span></div>
          <div class="dr-pts-col">${ptsDisplay}</div>
        </div>`;
      });

      // Sous-total série
      const seriesPts = items.filter(i=>i.resultKnown).reduce((a,i)=>a+(i.pts||0),0);
      const hasPending = items.some(i=>!i.resultKnown);
      html += `<div class="dr-total-row">
        <span>Sous-total ${s.label.split(' ').slice(-1)[0]}</span>
        <span class="dr-total-pts">+${seriesPts} pts</span>
      </div>`;
      if (hasPending) html += `<div class="dr-pending-note" style="padding:0 .75rem .5rem">* Paris en attente non comptabilisés</div>`;

      html += `</div>`; // close detail-section
    });

    // Total général
    html += `<div style="margin:.75rem 1.25rem 0;padding:.9rem 1rem;background:rgba(247,199,68,.06);border:1px solid rgba(247,199,68,.2);border-radius:8px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:.75rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2)">Total général</span>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);letter-spacing:1px">${totalPts} <span style="font-size:.7rem;font-family:'DM Sans',sans-serif;color:var(--muted2)">pts</span></span>
    </div>`;
  }

  document.getElementById('drawer-content').innerHTML = html;
  document.getElementById('drawer-overlay').classList.add('open');
}

function closeDrawer(e) {
  if (e.target === document.getElementById('drawer-overlay')) {
    document.getElementById('drawer-overlay').classList.remove('open');
  }
}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
